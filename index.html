<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #0c0c0c;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(54,255,0,0.1), 0 8px 20px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            gap: 12px;
        }

        .logo-icon {
            font-size: 42px;
            line-height: 1;
            filter: drop-shadow(0 0 8px #36FF00);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #36FF00, #FFDD21);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #aaa;
            letter-spacing: 0.3px;
        }

        select, input {
            width: 100%;
            padding: 16px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: all 0.2s ease;
            appearance: none;
            -webkit-appearance: none;
            font-family: inherit;
        }

        select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23aaaaaa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
        }

        select:focus, input:focus {
            border-color: #FFDD21;
            box-shadow: 0 0 0 3px rgba(255, 221, 33, 0.2);
        }

        button {
            width: 100%;
            padding: 18px 14px;
            background: #36FF00;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            box-shadow: 0 8px 20px rgba(54, 255, 0, 0.3);
            letter-spacing: 0.3px;
        }

        button:hover:not(:disabled) {
            background: #2ee600;
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(54, 255, 0, 0.5);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background: #2a2a2a;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            display: none;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .status.success {
            display: block;
            background: rgba(54, 255, 0, 0.15);
            color: #36FF00;
            border-color: #36FF00;
        }

        .status.error {
            display: block;
            background: rgba(255, 70, 70, 0.15);
            color: #ff4646;
            border-color: #ff4646;
        }

        @media (max-width: 420px) {
            .container {
                padding: 20px 16px;
            }
            .logo-icon {
                font-size: 36px;
            }
            .logo-text {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <span class="logo-icon">💳</span>
            <span class="logo-text">Finances</span>
        </div>
        
        <div class="field">
            <label for="typeSelect">Тип операции</label>
            <select id="typeSelect" disabled>
                <option value="">Загрузка типов...</option>
            </select>
        </div>

        <div class="field">
            <label for="accountSelect">Счёт</label>
            <select id="accountSelect" disabled>
                <option value="">Сначала выберите тип</option>
            </select>
        </div>

        <div class="field">
            <label for="amountInput">Сумма</label>
            <input type="number" id="amountInput" placeholder="0.00" min="0" step="0.01" />
        </div>

        <button id="saveBtn" disabled>Сохранить</button>
        
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        // ⚠️ ЗАМЕНИТЕ НА ВАШ URL СКРИПТА
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxukbNXFCK7In9hYlq7frZjFPrOXA0URGN87mSjaeHLTHcM_0rpaJ5c3IURHzCyjEvudg/exec';

        const typeSelect = document.getElementById('typeSelect');
        const accountSelect = document.getElementById('accountSelect');
        const amountInput = document.getElementById('amountInput');
        const saveBtn = document.getElementById('saveBtn');
        const statusDiv = document.getElementById('statusMessage');

        let categoriesData = null;

        async function loadCategories() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                categoriesData = data;
                const types = Object.keys(categoriesData);
                typeSelect.innerHTML = '<option value="">Выберите тип</option>';
                types.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeSelect.appendChild(option);
                });
                typeSelect.disabled = false;
            } catch (error) {
                console.error(error);
                typeSelect.innerHTML = '<option value="">Ошибка загрузки</option>';
                statusDiv.textContent = 'Не удалось загрузить данные. Попробуйте позже.';
                statusDiv.className = 'status error';
            }
        }

        function onTypeChange() {
            const selectedType = typeSelect.value;
            if (!selectedType) {
                accountSelect.innerHTML = '<option value="">Сначала выберите тип</option>';
                accountSelect.disabled = true;
                saveBtn.disabled = true;
                return;
            }
            
            const accounts = categoriesData[selectedType] || [];
            accountSelect.innerHTML = '<option value="">Выберите счёт</option>';
            accounts.forEach(account => {
                const option = document.createElement('option');
                option.value = account;
                option.textContent = account;
                accountSelect.appendChild(option);
            });
            accountSelect.disabled = false;
            saveBtn.disabled = true;
        }

        function checkSaveButton() {
            const typeOk = typeSelect.value && typeSelect.value !== '';
            const accountOk = accountSelect.value && accountSelect.value !== '';
            const amountOk = amountInput.value && parseFloat(amountInput.value) > 0;
            saveBtn.disabled = !(typeOk && accountOk && amountOk);
        }

        async function saveExpense(type, account, amount) {
            const formData = new URLSearchParams();
            formData.append('type', type);
            formData.append('account', account);
            formData.append('amount', amount);
            
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                
                statusDiv.textContent = '✅ Запись отправлена!';
                statusDiv.className = 'status success';
                
                amountInput.value = '';
                typeSelect.value = '';
                accountSelect.innerHTML = '<option value="">Сначала выберите тип</option>';
                accountSelect.disabled = true;
                saveBtn.disabled = true;
                
                if (window.Telegram && Telegram.WebApp) {
                    setTimeout(() => Telegram.WebApp.close(), 1000);
                }
            } catch (error) {
                console.error(error);
                statusDiv.textContent = '❌ Ошибка при сохранении. Попробуйте ещё раз.';
                statusDiv.className = 'status error';
                saveBtn.disabled = false;
            }
        }

        saveBtn.addEventListener('click', () => {
            const type = typeSelect.value;
            const account = accountSelect.value;
            const amount = parseFloat(amountInput.value);
            if (!type || !account || isNaN(amount) || amount <= 0) return;
            
            saveBtn.disabled = true;
            statusDiv.textContent = 'Отправка...';
            statusDiv.className = 'status';
            
            saveExpense(type, account, amount);
        });

        typeSelect.addEventListener('change', () => {
            onTypeChange();
            checkSaveButton();
        });
        accountSelect.addEventListener('change', checkSaveButton);
        amountInput.addEventListener('input', checkSaveButton);

        loadCategories();

        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
