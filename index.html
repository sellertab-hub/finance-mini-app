<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Mini App</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* Стили полностью идентичны предыдущим версиям, я их не дублирую для краткости, но они должны быть здесь */
        /* (вставьте полные стили из предыдущего ответа) */
    </style>
</head>
<body>
    <div class="app-container">
        <div class="logo-area">
            <img src="logo.png" alt="Finance Logo" class="logo-image">
        </div>

        <div class="segmented-control">
            <button class="segmented-btn active" data-screen="0">ADD</button>
            <button class="segmented-btn" data-screen="1">FLOW</button>
            <button class="segmented-btn" data-screen="2">SUM</button>
        </div>

        <div class="screens-container" id="screensContainer">
            <!-- Экран 1: ADD -->
            <div class="screen" id="screen0">
                <!-- содержимое как раньше -->
            </div>

            <!-- Экран 2: FLOW -->
            <div class="screen" id="screen1">
                <div class="period-selector" id="historyPeriod">
                    <button class="period-btn" data-period="today">Today</button>
                    <button class="period-btn" data-period="week">Week</button>
                    <button class="period-btn" data-period="month" id="historyMonthBtn">Month</button>
                    <button class="period-btn" data-period="all">All</button>
                </div>
                <div class="month-dropdown" id="historyMonthDropdown"></div>
                <div id="historyList"></div>
                <div id="historyStatus" style="text-align: center; padding: 20px; color: #aaa;"></div>
            </div>

            <!-- Экран 3: SUM -->
            <div class="screen" id="screen2">
                <div class="period-selector" id="summaryPeriod">
                    <button class="period-btn" data-period="today">Today</button>
                    <button class="period-btn" data-period="week">Week</button>
                    <button class="period-btn" data-period="month" id="summaryMonthBtn">Month</button>
                    <button class="period-btn" data-period="all">All</button>
                </div>
                <div class="month-dropdown" id="summaryMonthDropdown"></div>
                <div class="tab-bar" id="summaryTabs">
                    <button class="tab active" data-tab="table">Таблица</button>
                    <button class="tab" data-tab="charts">Графики</button>
                </div>
                <div id="summaryTable" style="display: block;"></div>
                <div id="summaryCharts" style="display: none;">
                    <div class="chart-container">
                        <canvas id="chartTypes"></canvas>
                    </div>
                    <div id="chartDetail" style="margin-top: 16px; color: #aaa; text-align: center;">Нажмите на сегмент для детализации</div>
                </div>
                <div id="summaryStatus" style="text-align: center; padding: 20px; color: #aaa;"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для редактирования/удаления (без изменений) -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Редактирование</div>
            <div id="editForm">
                <div style="margin-bottom: 16px; color:#aaa;">
                    <div id="editDisplayType" style="margin-bottom:8px;"></div>
                    <div id="editDisplayAccount" style="margin-bottom:8px;"></div>
                    <div id="editDisplayArticle" style="margin-bottom:8px;"></div>
                </div>
                <input type="number" id="editAmount" placeholder="Сумма" min="0" step="0.01" />
                <textarea id="editComment" placeholder="Комментарий"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn delete" id="deleteBtn">Удалить</button>
                <button class="modal-btn cancel" id="cancelBtn">Отмена</button>
                <button class="modal-btn edit" id="updateBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // ===== НАСТРОЙКИ =====
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxukbNXFCK7In9hYlq7frZjFPrOXA0URGN87mSjaeHLTHcM_0rpaJ5c3IURHzCyjEvudg/exec'; // ЗАМЕНИТЕ НА ВАШ URL

        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let categoriesData = null;
        let currentFilterHistory = { period: 'today' };
        let currentFilterSummary = { period: 'today' };
        let activeDropdown = null;
        let currentArticleSign = 'plus';
        let chartInstances = {};
        let currentSummaryData = null;
        let currentEditRow = null;
        let currentEditSign = 'plus';
        let allMonths = [];

        // ===== ЭЛЕМЕНТЫ ЭКРАНА ADD (без изменений) =====
        // ... (полный код элементов ADD)

        // ===== ЭЛЕМЕНТЫ ФИЛЬТРОВ =====
        const historyPeriodBtns = document.querySelectorAll('#historyPeriod .period-btn');
        const summaryPeriodBtns = document.querySelectorAll('#summaryPeriod .period-btn');
        const historyMonthBtn = document.getElementById('historyMonthBtn');
        const summaryMonthBtn = document.getElementById('summaryMonthBtn');
        const historyMonthDropdown = document.getElementById('historyMonthDropdown');
        const summaryMonthDropdown = document.getElementById('summaryMonthDropdown');

        // ===== ЭЛЕМЕНТЫ ЭКРАНА FLOW =====
        const historyListDiv = document.getElementById('historyList');
        const historyStatus = document.getElementById('historyStatus');

        // ===== ЭЛЕМЕНТЫ ЭКРАНА SUM =====
        const summaryContentDiv = document.getElementById('summaryTable');
        const summaryChartsDiv = document.getElementById('summaryCharts');
        const summaryStatus = document.getElementById('summaryStatus');
        const summaryTabs = document.querySelectorAll('#summaryTabs .tab');
        const chartCanvas = document.getElementById('chartTypes');
        const chartDetailDiv = document.getElementById('chartDetail');

        // ===== ЭЛЕМЕНТЫ МОДАЛЬНОГО ОКНА =====
        const modal = document.getElementById('editModal');
        const modalTitle = document.getElementById('modalTitle');
        const editAmount = document.getElementById('editAmount');
        const editComment = document.getElementById('editComment');
        const editDisplayType = document.getElementById('editDisplayType');
        const editDisplayAccount = document.getElementById('editDisplayAccount');
        const editDisplayArticle = document.getElementById('editDisplayArticle');
        const deleteBtn = document.getElementById('deleteBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const updateBtn = document.getElementById('updateBtn');

        // ===== ЭЛЕМЕНТЫ НАВИГАЦИИ =====
        const screensContainer = document.getElementById('screensContainer');
        const segButtons = document.querySelectorAll('.segmented-btn');

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function getCurrentMonth() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        }

        function formatMonth(monthStr) {
            const [year, month] = monthStr.split('-');
            const date = new Date(parseInt(year), parseInt(month)-1, 1);
            return date.toLocaleString('en', { month: 'short' }).toUpperCase();
        }

        // ===== ЗАГРУЗКА МЕСЯЦЕВ ИЗ ЛИСТА MONTHS =====
        async function loadMonths() {
            try {
                const url = `${APPS_SCRIPT_URL}?action=months`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                allMonths = data; // ожидаем массив строк типа "2026-03"
                console.log('Months loaded', allMonths);
            } catch (e) {
                console.error('Failed to load months', e);
                allMonths = [getCurrentMonth()];
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        async function init() {
            await loadMonths(); // загружаем месяцы первыми
            await loadCategories();
            attachNavigationListeners();
            attachPeriodListeners();
            attachSelectListeners();
            attachModalListeners();
            attachTabListeners();

            setActivePeriod(historyPeriodBtns, 'today');
            setActivePeriod(summaryPeriodBtns, 'today');
            loadHistory();
            loadSummary();
            loadChartData();

            screensContainer.addEventListener('scroll', syncSegmentedButtons);
        }

        function setActivePeriod(btns, period) {
            btns.forEach(btn => {
                if (btn.dataset.period === period) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // ===== НАВИГАЦИЯ =====
        function attachNavigationListeners() {
            segButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const screenIndex = btn.dataset.screen;
                    screensContainer.scrollTo({
                        left: screensContainer.clientWidth * screenIndex,
                        behavior: 'smooth'
                    });
                });
            });
        }

        function syncSegmentedButtons() {
            const scrollLeft = screensContainer.scrollLeft;
            const width = screensContainer.clientWidth;
            const activeIndex = Math.round(scrollLeft / width);
            segButtons.forEach((btn, i) => {
                if (i === activeIndex) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        // ===== ФИЛЬТРЫ =====
        function attachPeriodListeners() {
            historyPeriodBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const period = btn.dataset.period;
                    if (period === 'month') {
                        if (currentFilterHistory.period === 'month') {
                            openMonthDropdown('history');
                        } else {
                            currentFilterHistory = { period: 'month', month: getCurrentMonth() };
                            updateMonthButton(historyMonthBtn, currentFilterHistory.month);
                            setActivePeriod(historyPeriodBtns, 'month');
                            loadHistory();
                        }
                    } else {
                        currentFilterHistory = { period };
                        setActivePeriod(historyPeriodBtns, period);
                        loadHistory();
                    }
                });
            });

            summaryPeriodBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const period = btn.dataset.period;
                    if (period === 'month') {
                        if (currentFilterSummary.period === 'month') {
                            openMonthDropdown('summary');
                        } else {
                            currentFilterSummary = { period: 'month', month: getCurrentMonth() };
                            updateMonthButton(summaryMonthBtn, currentFilterSummary.month);
                            setActivePeriod(summaryPeriodBtns, 'month');
                            loadSummary();
                            loadChartData();
                        }
                    } else {
                        currentFilterSummary = { period };
                        setActivePeriod(summaryPeriodBtns, period);
                        loadSummary();
                        loadChartData();
                    }
                });
            });
        }

        function updateMonthButton(btn, month) {
            btn.innerHTML = formatMonth(month) + ' <span class="arrow">▼</span>';
        }

        function openMonthDropdown(target) {
            console.log('openMonthDropdown', target, allMonths);
            const dropdown = target === 'history' ? historyMonthDropdown : summaryMonthDropdown;
            const currentMonth = target === 'history' ? currentFilterHistory.month : currentFilterSummary.month;
            
            // Закрываем все другие дропдауны
            document.querySelectorAll('.month-dropdown').forEach(d => d.classList.remove('show'));
            
            // Заполняем опции из allMonths
            dropdown.innerHTML = '';
            const months = allMonths.length ? allMonths : [getCurrentMonth()];
            months.forEach(m => {
                const div = document.createElement('div');
                div.className = 'month-option';
                div.textContent = formatMonth(m);
                if (m === currentMonth) div.classList.add('selected');
                div.addEventListener('click', () => {
                    if (target === 'history') {
                        currentFilterHistory.month = m;
                        updateMonthButton(historyMonthBtn, m);
                        loadHistory();
                    } else {
                        currentFilterSummary.month = m;
                        updateMonthButton(summaryMonthBtn, m);
                        loadSummary();
                        loadChartData();
                    }
                    dropdown.classList.remove('show');
                });
                dropdown.appendChild(div);
            });
            dropdown.classList.add('show');
        }

        // Закрытие дропдаунов при клике вне
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.period-btn') && !e.target.closest('.month-dropdown')) {
                document.querySelectorAll('.month-dropdown').forEach(d => d.classList.remove('show'));
            }
        });

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadCategories() {
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                categoriesData = data;
                populateTypeDropdown();
            } catch (e) {
                console.error(e);
                typeSelectedText.textContent = 'Ошибка загрузки';
            }
        }

        function buildUrl(action, filter) {
            let url = `${APPS_SCRIPT_URL}?action=${action}`;
            if (filter.period === 'month' && filter.month) {
                url += `&period=month&month=${filter.month}`;
            } else {
                url += `&period=${filter.period}`;
            }
            return url;
        }

        async function loadHistory() {
            historyListDiv.innerHTML = '';
            historyStatus.textContent = 'Загрузка...';
            try {
                const url = buildUrl('list', currentFilterHistory);
                const res = await fetch(url);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderHistory(data);
            } catch (e) {
                historyStatus.textContent = 'Ошибка загрузки истории';
            }
        }

        async function loadSummary() {
            summaryContentDiv.innerHTML = '';
            summaryStatus.textContent = 'Загрузка...';
            try {
                const url = buildUrl('summary', currentFilterSummary);
                const res = await fetch(url);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                renderSummary(data);
            } catch (e) {
                summaryStatus.textContent = 'Ошибка загрузки итогов';
            }
        }

        async function loadChartData() {
            try {
                const url = buildUrl('chart', currentFilterSummary);
                const res = await fetch(url);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                currentSummaryData = data;
                if (document.getElementById('summaryCharts').style.display === 'block') {
                    renderCharts(data);
                }
            } catch (e) {
                console.error('Chart error', e);
            }
        }

        // ===== ОТОБРАЖЕНИЕ ИСТОРИИ =====
        function renderHistory(records) {
            historyStatus.textContent = '';
            if (!records.length) {
                historyStatus.textContent = 'Нет записей';
                return;
            }
            records.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            records.forEach(rec => {
                const date = new Date(rec.timestamp).toLocaleString('ru', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
                const amountColor = rec.amount < 0 ? '#ff4646' : '#36FF00';
                const item = document.createElement('div');
                item.className = 'transaction-item';
                item.dataset.row = rec.row;
                item.innerHTML = `
                    <div class="transaction-main">
                        <div class="transaction-left">
                            <span class="transaction-type">${rec.type}</span>
                            <span class="transaction-account">${rec.account}</span>
                            <span class="transaction-article">${rec.article}</span>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span class="transaction-amount" style="color: ${amountColor}">${rec.amount.toFixed(2)}</span>
                            <span class="edit-icon" data-row="${rec.row}">✏️</span>
                        </div>
                    </div>
                    ${rec.comment ? `<div class="transaction-comment">💬 ${rec.comment}</div>` : ''}
                    <div class="transaction-date">${date}</div>
                `;
                const editIcon = item.querySelector('.edit-icon');
                editIcon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEditModal(rec);
                });
                historyListDiv.appendChild(item);
            });
        }

        // ===== ОТОБРАЖЕНИЕ ИТОГОВ (ТАБЛИЦА) =====
        function renderSummary(summary) {
            summaryStatus.textContent = '';
            if (Object.keys(summary).length === 0) {
                summaryStatus.textContent = 'Нет данных';
                return;
            }
            let html = '';
            for (let type in summary) {
                let typeTotal = 0;
                let accountsHtml = '';
                for (let account in summary[type]) {
                    let accountTotal = 0;
                    let articlesHtml = '';
                    for (let article in summary[type][account]) {
                        let amount = summary[type][account][article];
                        accountTotal += amount;
                        const amountColor = amount < 0 ? '#ff4646' : '#36FF00';
                        articlesHtml += `<div class="summary-article"><span>${article}</span><span class="summary-article-amount" style="color: ${amountColor}">${amount.toFixed(2)}</span></div>`;
                    }
                    typeTotal += accountTotal;
                    const accountTotalColor = accountTotal < 0 ? '#ff4646' : '#FFDD21';
                    accountsHtml += `
                        <div class="summary-account">
                            <div class="summary-account-header"><span>${account}</span><span style="color: ${accountTotalColor}">${accountTotal.toFixed(2)}</span></div>
                            ${articlesHtml}
                        </div>
                    `;
                }
                const typeTotalColor = typeTotal < 0 ? '#ff4646' : '#36FF00';
                html += `
                    <div class="summary-block">
                        <div class="summary-type"><span>${type}</span><span class="summary-type-total" style="color: ${typeTotalColor}">${typeTotal.toFixed(2)}</span></div>
                        ${accountsHtml}
                    </div>
                `;
            }
            summaryContentDiv.innerHTML = html;
        }

        // ===== ГРАФИКИ =====
        function renderCharts(data) {
            if (chartInstances.types) chartInstances.types.destroy();
            
            const typesData = {};
            for (let [type, val] of Object.entries(data.types)) {
                if (Math.abs(val) > 0.01) typesData[type] = val;
            }
            
            const ctx = chartCanvas.getContext('2d');
            chartInstances.types = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(typesData),
                    datasets: [{
                        data: Object.values(typesData),
                        backgroundColor: ['#36FF00', '#FFDD21', '#4069FF', '#ff4646', '#aa80ff', '#ffaa80'],
                        borderColor: '#000',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    onClick: (event, item) => {
                        if (item.length > 0) {
                            const index = item[0].dataIndex;
                            const type = Object.keys(typesData)[index];
                            showChartDetail(type, data);
                        }
                    }
                }
            });
        }

        function showChartDetail(type, data) {
            let html = `<div style="color:#36FF00; font-weight:600; margin-bottom:8px;">${type}</div>`;
            for (let [account, val] of Object.entries(data.accounts)) {
                if (Math.abs(val) > 0.01) {
                    html += `<div style="display:flex; justify-content:space-between; padding:4px 0;"><span>${account}</span><span style="color:${val<0?'#ff4646':'#36FF00'}">${val.toFixed(2)}</span></div>`;
                }
            }
            chartDetailDiv.innerHTML = html;
        }

        // ===== ЛОГИКА КАСТОМНЫХ СЕЛЕКТОВ (ADD) =====
        // (полный код функций populateTypeDropdown, resetAccountAndArticle, enableAccountSelect, updateAccountOptions, resetArticle, enableArticleSelect, updateArticleOptions, populateDropdown, toggleDropdown, closeAllDropdowns, checkSaveButton, saveExpense, attachSelectListeners, openEditModal, attachModalListeners, attachTabListeners)
        // Здесь они опущены для краткости, но в реальном файле они должны быть.
        // Вставьте их из предыдущего рабочего HTML.

        // ===== СТАРТ =====
        init();

        if (window.Telegram?.WebApp) Telegram.WebApp.ready();
    </script>
</body>
</html>
